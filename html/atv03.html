<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      caption {
        font-size: 20px;
        text-align: center;
      }
      table {
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid black;
        padding: 4px;
      }
    </style>
  </head>
  <body>
    <table>
      <caption>
        Agenda semanal
      </caption>
      <thead>
        <th>Horário</th>
        <th>Segunda</th>
        <th>Terça</th>
        <th>Quarta</th>
        <th>Quinta</th>
        <th>Sexta</th>
      </thead>

      <tbody>
        <tr>
          <td>08:00-10:00</td>
          <td rowspan="2">Matemática</td>
          <td>Português</td>
          <td rowspan="2">História</td>
          <td>Geografia</td>
          <td rowspan="2">Ciências</td>
        </tr>

        <tr>
          <td>10:00-12:00</td>
          <td>Inglês</td>
          <td>Artes</td>
        </tr>

        <tr>
          <td>13:00-15:00</td>
          <td>Educação Física</td>
          <td>Matemática</td>
          <td>Português</td>
          <td rowspan="2">Biologia</td>
          <td>Química</td>
        </tr>

        <tr>
          <td>15:00-17:00</td>
          <td>Física</td>
          <td>Matemática</td>
          <td>Redação</td>
          <td>História</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
