<!doctype html>
<html lang="pr-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabela01</title>
    <style>
      table {
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid black;
        padding: 4px;
      }
    </style>
  </head>
  <body>
    <table>
        <tr>
          <th>Nome:</th>
          <td>Julia</td>
          <td>João</td>
          <td>Paula</td>
        </tr>
        <tr>
          <th colspan="4">Idade</th>
        </tr>
      </tbody>
    </table>
  </body>
</html>
